services:
  drone-inspection-agent:
    build: .
    ports:
      - "8020:8020"
    volumes:
      - ./sample_data:/app/sample_data:ro
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8020/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
